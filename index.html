<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelWeather — Minecraft Weather Dashboard</title>

  <!-- Google Fonts: Press Start 2P (required by NES.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <!-- NES.css — pixel-art UI framework -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css"
  />

  <!-- Animate.css — entrance & effect animations -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />

  <!-- App stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/weather.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body class="day-mode">

  <!-- ================================================
       WEATHER BACKGROUND EFFECT LAYER (rain / snow / fog)
  ================================================ -->
  <div id="weather-bg-effect" class="weather-bg-effect"></div>

  <!-- ================================================
       LOADING OVERLAY
       NES.css: nes-progress is-primary + "Building terrain..."
  ================================================ -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-box nes-container is-dark is-rounded">
      <p class="loading-title">Building terrain...</p>
      <progress
        class="nes-progress is-primary"
        id="loading-bar"
        value="0"
        max="100"
      ></progress>
      <p class="loading-sub">Fetching weather data...</p>
    </div>
  </div>

  <!-- ================================================
       ERROR DIALOG — "You Died!"
       NES.css: nes-dialog is-dark is-rounded
  ================================================ -->
  <dialog id="error-dialog" class="nes-dialog is-dark is-rounded">
    <form method="dialog">
      <p class="title error-title">You Died!</p>
      <p id="error-message" class="error-body">City not found. Try again!</p>
      <menu class="dialog-menu">
        <button
          type="button"
          id="error-close-btn"
          class="nes-btn is-error"
        >
          Respawn
        </button>
      </menu>
    </form>
  </dialog>

  <!-- ================================================
       HEADER
  ================================================ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <span class="logo-icon" aria-hidden="true">⛏</span>
        <h1 class="logo-text">PixelWeather</h1>
      </div>

      <button
        id="theme-toggle-btn"
        class="nes-btn is-warning theme-btn"
        aria-label="Toggle day/night mode"
      >
        ☀ Day
      </button>
    </div>
  </header>

  <!-- ================================================
       SEARCH SECTION
       NES.css: nes-input inside nes-container is-dark
  ================================================ -->
  <section class="search-section" aria-label="City search">
    <div class="nes-container is-dark search-container">
      <div class="search-inner">
        <div class="nes-field search-field">
          <label for="city-input" class="sr-only">Enter city name</label>
          <input
            type="text"
            id="city-input"
            class="nes-input is-dark"
            placeholder="Enter city name..."
            autocomplete="off"
            aria-label="City name"
          />
        </div>
        <button
          id="search-btn"
          class="nes-btn is-primary search-btn"
          aria-label="Search weather"
        >
          Search
        </button>
      </div>
      <p class="search-hint">
        Try: London &nbsp;·&nbsp; Tokyo &nbsp;·&nbsp; New York &nbsp;·&nbsp; Mumbai
      </p>
    </div>
  </section>

  <!-- ================================================
       MAIN CONTENT (hidden until first fetch succeeds)
  ================================================ -->
  <main id="main-content" class="main-content hidden" aria-live="polite">

    <!-- ---- Current Weather Card ---- -->
    <section
      class="current-weather-section animate__animated animate__fadeInUp"
      aria-label="Current weather"
    >
      <div class="nes-container with-title is-dark current-card" id="current-weather-card">
        <p class="title" id="card-city-title">Current Weather</p>

        <div class="weather-card-inner">

          <!-- Column 1: Icon + condition -->
          <div class="weather-icon-col">
            <img
              id="weather-icon"
              class="pixel-icon weather-icon"
              src=""
              alt="Weather icon"
            />
            <p id="weather-condition" class="condition-text"></p>
            <p id="weather-date"      class="date-text"></p>
          </div>

          <!-- Column 2: Temperature -->
          <div class="weather-temp-col">
            <p class="temp-main" id="temp-main">--°C</p>
            <div class="feels-row">
              <i class="nes-icon heart is-small" aria-hidden="true"></i>
              <span id="temp-feels">Feels like --°C</span>
            </div>
          </div>

          <!-- Column 3: Stats -->
          <div class="weather-stats-col">
            <div class="stat-item">
              <span class="stat-label">💧 Humidity</span>
              <span id="stat-humidity" class="stat-value">--%</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">💨 Wind</span>
              <span id="stat-wind" class="stat-value">-- km/h</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">👁 Visibility</span>
              <span id="stat-visibility" class="stat-value">-- km</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">🌡 Pressure</span>
              <span id="stat-pressure" class="stat-value">-- hPa</span>
            </div>
          </div>

        </div><!-- /weather-card-inner -->

        <!-- Minecraft Advice Balloon -->
        <div class="advice-row">
          <div
            class="nes-balloon from-left advice-balloon"
            role="note"
            aria-label="Minecraft weather advice"
          >
            <p id="advice-text">Loading advice...</p>
          </div>
        </div>

      </div><!-- /current-card -->
    </section>

    <!-- ---- 5-Day Forecast ---- -->
    <section
      class="forecast-section animate__animated animate__fadeInUp"
      aria-label="5-day forecast"
    >
      <div class="nes-container is-dark forecast-container">
        <p class="section-title">📅 5-Day Forecast</p>
        <div class="forecast-row" id="forecast-row">
          <!-- Populated by ui.js renderForecast() -->
        </div>
      </div>
    </section>

  </main><!-- /main-content -->

  <!-- ================================================
       SCRIPTS (order matters: utils → api → ui → app)
  ================================================ -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
